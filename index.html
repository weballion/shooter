<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neon Arena — 3D FPS</title>
<link rel="stylesheet" href="style.css" />
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three/three.module.js"
  }
}
</script>
</head>
<body>

<div id="game-container"></div>

<div id="hud" class="hidden">
  <div id="crosshair"></div>
  <div id="hit-marker"></div>
  <div id="damage-numbers"></div>
  <div id="health-bars">
    <div class="health-row">
      <span class="health-label">YOU</span>
      <div class="health-bar"><div id="player-health-fill" class="health-fill player"></div></div>
    </div>
    <div id="enemy-health-list"></div>
  </div>
</div>

<div id="start-screen" class="overlay">
  <div class="panel">
    <h1>NEON ARENA</h1>
    <p>Fight computer-controlled sentries to the death in the arena.</p>
    <ul class="controls-list">
      <li><span class="key">&uarr; &darr;</span> Move forward / backward</li>
      <li><span class="key">&larr; &rarr;</span> Strafe left / right</li>
      <li><span class="key">MOUSE</span> Look around</li>
      <li><span class="key">SPACE / LMB</span> Fire</li>
      <li><span class="key">ESC</span> Pause</li>
    </ul>
    <div class="enemy-count-selector">
      <span class="selector-label">ENEMIES</span>
      <div class="count-buttons" data-screen="start">
        <button class="count-btn" data-count="1">1</button>
        <button class="count-btn" data-count="2">2</button>
        <button class="count-btn" data-count="3">3</button>
        <button class="count-btn" data-count="4">4</button>
      </div>
    </div>
    <button id="start-button">START</button>
  </div>
</div>

<div id="end-screen" class="overlay hidden">
  <div class="panel">
    <h1 id="end-title">—</h1>
    <div class="enemy-count-selector">
      <span class="selector-label">ENEMIES</span>
      <div class="count-buttons" data-screen="end">
        <button class="count-btn" data-count="1">1</button>
        <button class="count-btn" data-count="2">2</button>
        <button class="count-btn" data-count="3">3</button>
        <button class="count-btn" data-count="4">4</button>
      </div>
    </div>
    <button id="restart-button">RESTART</button>
  </div>
</div>

<div id="pause-screen" class="overlay hidden">
  <div class="panel">
    <h1>PAUSED</h1>
    <button id="resume-button">RESUME</button>
  </div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
